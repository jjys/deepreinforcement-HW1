<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW1 網格地圖 RL 策略評估</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>強化學習 HW1: 網格地圖與策略評估</h1>
        <div class="controls-panel">
            <div class="control-group">
                <label for="grid-size">網格地圖大小 (n): <span id="n-val" class="highlight-val">5</span></label>
                <input type="range" id="grid-size" min="5" max="9" value="5" step="1">
            </div>
            <div class="actions">
                <button id="btn-reset" class="btn btn-secondary">重新設定</button>
                <button id="btn-eval" class="btn btn-primary" disabled>評估隨機策略</button>
            </div>
        </div>
        
        <div class="instructions-card">
            <p id="status-text" class="status-msg">步驟 1: 點擊單元格設定 <strong>起始點</strong> (顯示為綠色)。</p>
        </div>
        
        <div class="main-workspace">
            <div class="grid-section">
                <h3>互動網格地圖</h3>
                <div id="grid-container" class="grid-container map-grid"></div>
            </div>
        </div>
        
        <div id="results-section" class="results-section hidden">
            <h2>策略顯示與價值評估結果</h2>
            <div class="results-container">
                <div class="result-box">
                    <h3>策略 Matrix π(s)</h3>
                    <div id="policy-matrix" class="grid-container policy-grid"></div>
                </div>
                <div class="result-box">
                    <h3>價值 Matrix V(s)</h3>
                    <div id="value-matrix" class="grid-container value-grid"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
